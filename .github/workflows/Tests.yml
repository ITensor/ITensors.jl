name: "Tests"
on:
  push:
    branches:
      - "main"
    tags: "*"
    paths-ignore:
      - "docs/**"
  pull_request:
    types:
      - "opened"
      - "synchronize"
      - "reopened"
      - "ready_for_review"
      - "converted_to_draft"
  workflow_dispatch: ~
concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: "${{ startsWith(github.ref, 'refs/pull/') }}"
permissions:
  contents: "read"
  pull-requests: "read"
jobs:
  classify:
    name: "Classify"
    runs-on: "ubuntu-latest"
    outputs:
      substantive: "${{ steps.classify.outputs.substantive }}"
    steps:
      - uses: "ITensor/ITensorActions/.github/actions/classify-pr@mf/subdir-inputs"
        id: "classify"
        with:
          exclude-subdirs: "NDTensors"
  tests:
    name: "Tests"
    needs: "classify"
    if: "${{ needs.classify.outputs.substantive == 'true' }}"
    strategy:
      fail-fast: false
      matrix:
        version:
          - "lts"
          - "1"
        os:
          - "ubuntu-latest"
          - "macOS-latest"
          - "windows-latest"
    uses: "ITensor/ITensorActions/.github/workflows/Tests.yml@mf/subdir-inputs"
    with:
      julia-version: "${{ matrix.version }}"
      os: "${{ matrix.os }}"
      nthreads: 2
      test-args: "base"
      localregistry: "https://github.com/ITensor/ITensorRegistry.git"
    secrets:
      CODECOV_TOKEN: "${{ secrets.CODECOV_TOKEN }}"
  tests-gate:
    name: "Tests"
    needs:
      - "classify"
      - "tests"
    if: "${{ always() }}"
    runs-on: "ubuntu-latest"
    steps:
      - name: "Verify result"
        run: |
          echo "classify.substantive = ${{ needs.classify.outputs.substantive }}"
          echo "tests.result = ${{ needs.tests.result }}"
          if [ "${{ needs.classify.outputs.substantive }}" != "true" ]; then
            echo "Non-substantive PR for ITensors's scope; Tests skipped (not run). Reporting success."
            exit 0
          fi
          test "${{ needs.tests.result }}" = "success"
