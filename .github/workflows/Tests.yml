name: "Tests"
on:
  push:
    branches:
      - "main"
    tags: "*"
    paths-ignore:
      - "docs/**"
  pull_request:
    types:
      - "opened"
      - "synchronize"
      - "reopened"
      - "ready_for_review"
      - "converted_to_draft"
  workflow_dispatch: ~
concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: "${{ startsWith(github.ref, 'refs/pull/') }}"
permissions:
  contents: "read"
jobs:
  tests-itensors:
    name: "TestsITensors"
    strategy:
      fail-fast: false
      matrix:
        version:
          - "lts"
          - "1"
        os:
          - "ubuntu-latest"
          - "macOS-latest"
          - "windows-latest"
    uses: "ITensor/ITensorActions/.github/workflows/Tests.yml@mf/subdir-inputs"
    with:
      julia-version: "${{ matrix.version }}"
      os: "${{ matrix.os }}"
      nthreads: 2
      test-args: "base"
      extra-dev-paths: "NDTensors"
      localregistry: "https://github.com/ITensor/ITensorRegistry.git"
    secrets:
      CODECOV_TOKEN: "${{ secrets.CODECOV_TOKEN }}"
  tests-ndtensors:
    name: "TestsNDTensors"
    strategy:
      fail-fast: false
      matrix:
        version:
          - "lts"
          - "1"
    uses: "ITensor/ITensorActions/.github/workflows/Tests.yml@mf/subdir-inputs"
    with:
      project: "NDTensors"
      julia-version: "${{ matrix.version }}"
      os: "ubuntu-latest"
      nthreads: 2
      localregistry: "https://github.com/ITensor/ITensorRegistry.git"
    secrets:
      CODECOV_TOKEN: "${{ secrets.CODECOV_TOKEN }}"
  tests-gate:
    name: "Tests"
    needs:
      - "tests-itensors"
      - "tests-ndtensors"
    if: "${{ always() && needs.tests-itensors.result != 'skipped' && needs.tests-ndtensors.result != 'skipped' }}"
    runs-on: "ubuntu-latest"
    steps:
      - name: "Fail if any matrix leg failed"
        run: |
          echo "tests-itensors.result = ${{ needs.tests-itensors.result }}"
          echo "tests-ndtensors.result = ${{ needs.tests-ndtensors.result }}"
          test "${{ needs.tests-itensors.result }}" = "success"
          test "${{ needs.tests-ndtensors.result }}" = "success"
