name: "IntegrationTest"
on:
  push:
    branches:
      - "main"
    tags: "*"
  pull_request:
    types:
      - "opened"
      - "synchronize"
      - "reopened"
      - "ready_for_review"
      - "converted_to_draft"
jobs:
  integration-test:
    name: "IntegrationTest"
    strategy:
      matrix:
        pkg:
          - "ITensorGaussianMPS"
          - "ITensorMPS"
          - "ITensorNetworks"
          - "ITensorUnicodePlots"
          - "ITensorVisualizationBase"
          - "https://github.com/ITensor/Tennis.jl"
    uses: "ITensor/ITensorActions/.github/workflows/IntegrationTest.yml@main"
    secrets: "inherit"
    with:
      localregistry: "https://github.com/ITensor/ITensorRegistry.git"
      pkg: "${{ matrix.pkg }}"
      is-fork-pr: ${{ github.event.pull_request.head.repo.full_name != github.event.pull_request.base.repo.full_name }}
  integration-gate:
    name: "IntegrationTest"
    needs: "integration-test"
    if: "${{ always() && needs.integration-test.result != 'skipped' }}"
    runs-on: "ubuntu-latest"
    steps:
      - name: "Fail if any downstream integration test failed"
        run: |
          echo "integration-test.result = ${{ needs.integration-test.result }}"
          test "${{ needs.integration-test.result }}" = "success"
          
