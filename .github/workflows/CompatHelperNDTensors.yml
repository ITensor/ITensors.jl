name: "CompatHelperNDTensors"
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch: ~
permissions:
  contents: "write"
  pull-requests: "write"
jobs:
  compathelper:
    name: "CompatHelperNDTensors"
    uses: "ITensor/ITensorActions/.github/workflows/CompatHelper.yml@mf/subdir-inputs"
    with:
      subdir: "NDTensors"
      localregistry: "https://github.com/ITensor/ITensorRegistry.git"
    secrets: "inherit"
