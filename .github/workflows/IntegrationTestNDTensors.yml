name: "IntegrationTestNDTensors"
on:
  push:
    branches:
      - "main"
    tags: "*"
  pull_request:
    types:
      - "opened"
      - "synchronize"
      - "reopened"
      - "ready_for_review"
      - "converted_to_draft"
concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: "${{ startsWith(github.ref, 'refs/pull/') }}"
permissions:
  actions: "read"
  contents: "read"
jobs:
  integration-test:
    name: "IntegrationTestNDTensors"
    uses: "ITensor/ITensorActions/.github/workflows/IntegrationTest.yml@v2"
    secrets: "inherit"
    with:
      localregistry: "https://github.com/ITensor/ITensorRegistry.git"
      subdir: "NDTensors"
      paths: ".github"
      pkgs: |
        [
          "ITensors",
          "ITensorGaussianMPS",
          "ITensorMPS",
          "ITensorNetworks",
          "ITensorUnicodePlots",
          "ITensorVisualizationBase",
          "https://github.com/ITensor/Tennis.jl"
        ]
