name: "VersionCheckNDTensors"
on:
  pull_request:
    types:
      - "opened"
      - "synchronize"
      - "reopened"
      - "ready_for_review"
permissions:
  contents: "read"
  pull-requests: "read"
jobs:
  version-check:
    name: "VersionCheckNDTensors"
    uses: "ITensor/ITensorActions/.github/workflows/VersionCheck.yml@v2"
    with:
      subdir: "NDTensors"
      localregistry: "https://github.com/ITensor/ITensorRegistry.git"
