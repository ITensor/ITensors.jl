name: "TestsNDTensors"
on:
  push:
    branches:
      - "main"
    tags: "*"
    paths:
      - "NDTensors/**"
  pull_request:
    types:
      - "opened"
      - "synchronize"
      - "reopened"
      - "ready_for_review"
      - "converted_to_draft"
    paths:
      - "NDTensors/**"
  workflow_dispatch: ~
concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: "${{ startsWith(github.ref, 'refs/pull/') }}"
permissions:
  contents: "read"
jobs:
  tests:
    name: "TestsNDTensors Matrix"
    strategy:
      fail-fast: false
      matrix:
        version:
          - "lts"
          - "1"
    uses: "ITensor/ITensorActions/.github/workflows/Tests.yml@mf/subdir-inputs"
    with:
      subdir: "NDTensors"
      julia-version: "${{ matrix.version }}"
      os: "ubuntu-latest"
      nthreads: 2
      localregistry: "https://github.com/ITensor/ITensorRegistry.git"
    secrets:
      CODECOV_TOKEN: "${{ secrets.CODECOV_TOKEN }}"
  tests-gate:
    name: "TestsNDTensors"
    needs: "tests"
    if: "${{ always() && needs.tests.result != 'skipped' }}"
    runs-on: "ubuntu-latest"
    steps:
      - name: "Fail if any matrix leg failed"
        run: |
          echo "tests.result = ${{ needs.tests.result }}"
          test "${{ needs.tests.result }}" = "success"
