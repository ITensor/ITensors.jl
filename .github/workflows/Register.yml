name: "Register Package"
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to register or component to bump"
        required: true
jobs:
  register:
    runs-on: "ubuntu-latest"
    permissions:
      contents: "write"
    steps:
      - uses: "julia-actions/RegisterAction@v1"
        with:
          token: "${{ secrets.GITHUB_TOKEN }}"
